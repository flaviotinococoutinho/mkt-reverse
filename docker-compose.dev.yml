version: '3.9'

services:
  # PostgreSQL - Banco de dados principal
  postgres-main:
    image: postgres:16-alpine
    container_name: mkt-postgres
    environment:
      POSTGRES_DB: marketplace_main
      POSTGRES_USER: marketplace_user
      POSTGRES_PASSWORD: marketplace_pass
      POSTGRES_MULTIPLE_DATABASES: user_management,sourcing_management,opportunity_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
      - ./docker/postgres/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace_user -d marketplace_main"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mkt-network

  # RabbitMQ - Mensageria (para Event Sourcing futuro)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mkt-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: marketplace
      RABBITMQ_DEFAULT_PASS: marketplace_pass
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mkt-network

  # API Gateway - Backend Java
  api-gateway:
    build:
      context: .
      dockerfile: application/api-gateway/Dockerfile
    container_name: mkt-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-main:5432/marketplace_main
      SPRING_DATASOURCE_USERNAME: marketplace_user
      SPRING_DATASOURCE_PASSWORD: marketplace_pass
      JWT_SECRET: ${JWT_SECRET:-queroja-mvp-secret-key-minimo-256-bits-para-hs256}
      SERVER_PORT: 8081
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8081:8081"
    depends_on:
      postgres-main:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mkt-network

  # Frontend - React/Vite
  web-app:
    build:
      context: ./application/web-app
      dockerfile: Dockerfile
    container_name: mkt-web-app
    environment:
      VITE_API_URL: http://localhost:8081/api/v1
      VITE_WS_URL: ws://localhost:8081/ws
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    networks:
      - mkt-network

  # Nginx - Reverse Proxy (opcional)
  nginx:
    image: nginx:alpine
    container_name: mkt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
      - web-app
    networks:
      - mkt-network

# Networks
networks:
  mkt-network:
    driver: bridge

# Volumes
volumes:
  postgres_main_data:
    driver: local