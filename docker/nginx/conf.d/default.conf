map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Docker embedded DNS (dynamic upstream resolution).
# Without this, nginx caches container IPs at startup; if api-gateway restarts and gets a new IP,
# nginx may keep proxying to the old IP (which can be reassigned to another container).
resolver 127.0.0.11 ipv6=off valid=5s;
resolver_timeout 2s;

server {
  listen 80;
  server_name _;

  # UI (Vite dev server). Keep WebSocket headers for HMR.
  location / {
    proxy_pass http://web-app:5173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # API Gateway (REST)
  location /api/ {
    proxy_pass http://api-gateway:8080$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API Gateway (GraphQL)
  location /graphql {
    proxy_pass http://api-gateway:8080$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Actuator (useful in local)
  location /actuator/ {
    proxy_pass http://api-gateway:8080$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
