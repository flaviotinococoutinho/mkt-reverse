# ============================================================
# mkt-reverse — Docker Compose
# ============================================================
# Usage:
#   local:    docker compose up -d
#   dev:      docker compose --profile dev up -d
#   mvp:      docker compose --profile mvp up -d
#   cleanup:  docker compose down -v
# ============================================================

services:

  # ── Shared Infrastructure ────────────────────────────

  postgres-main:
    image: postgres:16-alpine
    container_name: mkt-postgres
    environment:
      POSTGRES_DB: marketplace_main
      POSTGRES_USER: marketplace_user
      POSTGRES_PASSWORD: marketplace_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace_user -d marketplace_main"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mkt-network
    profiles: [local, dev, mvp]

  postgres-user:
    image: postgres:16-alpine
    container_name: mkt-postgres-user
    environment:
      POSTGRES_DB: user_management
      POSTGRES_USER: marketplace_user
      POSTGRES_PASSWORD: marketplace_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - mkt-network
    profiles: [local, dev]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mkt-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: marketplace
      RABBITMQ_DEFAULT_PASS: marketplace_pass
      RABBITMQ_DEFAULT_VHOST: marketplace
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mkt-network
    profiles: [local, dev, mvp]

  redis:
    image: redis:7-alpine
    container_name: mkt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mkt-network
    profiles: [local, dev]

  # ── Applications ─────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: application/api-gateway/Dockerfile
      target: development
    container_name: mkt-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-main:5432/marketplace_main
      SPRING_DATASOURCE_USERNAME: marketplace_user
      SPRING_DATASOURCE_PASSWORD: marketplace_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: marketplace
      SPRING_RABBITMQ_PASSWORD: marketplace_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-queroja-mvp-secret-key-minimo-256-bits-para-hs256}
      JWT_ACCESS_TOKEN_VALIDITY: 3600000
      JWT_REFRESH_TOKEN_VALIDITY: 604800000
      LOGGING_LEVEL_COM_MARKETPLACE: DEBUG
    ports:
      - "8081:8081"
    depends_on:
      postgres-main:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mkt-network
    profiles: [local, dev, mvp]

  web-app:
    build:
      context: ./application/web-app
      dockerfile: Dockerfile
      target: development
    container_name: mkt-web-app
    environment:
      VITE_API_URL: http://localhost:8081/api/v1
      VITE_WS_URL: ws://localhost:8081/ws
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    networks:
      - mkt-network
    profiles: [local, dev]

  # ── Developer Tools ────────────────────────────────

  mailhog:
    image: mailhog/mailhog
    container_name: mkt-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - mkt-network
    profiles: [local]

  adminer:
    image: adminer:latest
    container_name: mkt-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres-main
    networks:
      - mkt-network
    profiles: [local]

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: mkt-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
      SPAN_STORAGE_TYPE: badger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - mkt-network
    profiles: [local]

networks:
  mkt-network:
    driver: bridge

volumes:
  postgres_main_data:
  postgres_user_data:
  rabbitmq_data:
  redis_data: